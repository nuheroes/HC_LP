<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리더십 진단 결과 — 이노핏파트너즈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --border: #E5E3DC;
  --text: #1A1916;
  --muted: #7A7870;
  --self:   #4472C4;
  --people: #ED7D31;
  --change: #4CAF50;
  --perf:   #9B59B6;
  --accent: #1A1916;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; color: var(--text); }

.header {
  background: var(--accent); color: #fff;
  padding: 22px 40px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-logo { font-size: 17px; font-weight: 900; letter-spacing: -0.02em; }
.header-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.btn-ghost {
  background: rgba(255,255,255,0.12); color: #fff;
  border: 1px solid rgba(255,255,255,0.25); border-radius: 8px;
  padding: 8px 16px; font-size: 12px; font-family: inherit;
  cursor: pointer; transition: background 0.2s; font-weight: 600;
}
.btn-ghost:hover { background: rgba(255,255,255,0.22); }

.container { max-width: 820px; margin: 0 auto; padding: 32px 24px 80px; }

.tab-bar { display: flex; gap: 6px; margin-bottom: 16px; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--muted);
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.respondent-card {
  background: var(--accent); color: #fff;
  border-radius: var(--radius); padding: 26px 34px;
  margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.respondent-card h2 { font-size: 24px; font-weight: 900; letter-spacing: -0.03em; }
.respondent-meta { font-size: 13px; color: #bbb; margin-top: 4px; }
.total-score-num { font-size: 50px; font-weight: 900; line-height: 1; letter-spacing: -0.04em; }
.total-score-label { font-size: 11px; color: #bbb; margin-top: 3px; text-align: right; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px 28px; margin-bottom: 14px;
}
.card-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 18px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* 방사형 그래프 */
.chart-wrap { display: flex; gap: 24px; align-items: center; }
.chart-canvas-wrap { flex: 0 0 300px; }
.chart-legend { flex: 1; }
.legend-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.legend-item:last-child { border-bottom: none; }
.legend-left { flex: 1; }
.legend-dot-label { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-label { font-size: 13px; font-weight: 700; }
.legend-desc { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.legend-bar-wrap { height: 4px; background: var(--bg); border-radius: 2px; }
.legend-bar-fill { height: 100%; border-radius: 2px; }
.legend-score { font-size: 17px; font-weight: 900; margin-left: 14px; letter-spacing: -0.02em; }

/* 하위요인 컴팩트 테이블 */
.factor-table { width: 100%; border-collapse: collapse; }
.factor-table thead th {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
  padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--border);
}
.factor-table thead th.r { text-align: right; }
.factor-row td { padding: 6px 8px; border-bottom: 1px solid #F2F0EA; vertical-align: middle; }
.factor-row:last-child td { border-bottom: none; }
.area-badge {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 1px 6px; border-radius: 8px; color: #fff;
  margin-right: 5px; vertical-align: middle;
}
.factor-name { font-size: 12px; font-weight: 600; }
.bar-cell { width: 100px; }
.bar-bg { height: 5px; background: var(--bg); border-radius: 3px; }
.bar-fill { height: 100%; border-radius: 3px; }
.score-cell { font-size: 12px; font-weight: 900; text-align: right; width: 40px; }
.desc-cell { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* 강점/개발 */
.highlight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.hl-card { border-radius: 10px; padding: 18px 20px; }
.hl-card.s { background: #EAF3DE; border: 1px solid #C0DD97; }
.hl-card.d { background: #FAECE7; border: 1px solid #F5C4B3; }
.hl-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 10px; }
.hl-tag.s { color: #3B6D11; }
.hl-tag.d { color: #993C1D; }
.hl-row { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
.hl-name { font-size: 13px; font-weight: 700; }
.hl-score { font-size: 13px; font-weight: 900; white-space: nowrap; }
.hl-score.s { color: #3B6D11; }
.hl-score.d { color: #993C1D; }
.hl-interp { font-size: 11px; color: var(--muted); line-height: 1.5; margin-top: 2px; margin-bottom: 8px; }

@media print {
  .header .btn-ghost, .tab-bar { display: none; }
  #tab-my { display: block !important; }
  #tab-all { display: none !important; }
  .container { padding: 16px; max-width: 100%; }
  .card { break-inside: avoid; }
}
@media (max-width: 640px) {
  .chart-wrap { flex-direction: column; }
  .chart-canvas-wrap { flex: none; width: 100%; }
  .highlight-grid { grid-template-columns: 1fr; }
  .respondent-card { flex-direction: column; gap: 10px; }
  .desc-cell { display: none; }
  .header { padding: 16px 20px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">innoFIT Partners</div>
    <div class="header-sub">디지털 리더십 진단 결과</div>
  </div>
  <button class="btn-ghost" onclick="window.print()">PDF 저장</button>
</div>

<div class="container">

  <!-- 내 결과 -->
  <div id="tab-my">
    <div class="respondent-card">
      <div>
        <h2 id="r-name">—</h2>
        <div class="respondent-meta" id="r-meta">—</div>
      </div>
      <div style="text-align:right">
        <div class="total-score-num" id="r-total">—</div>
        <div class="total-score-label">전체 평균 / 5점</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">영역별 종합 진단</div>
      <div class="chart-wrap">
        <div class="chart-canvas-wrap"><canvas id="radarChart" width="300" height="300"></canvas></div>
        <div class="chart-legend" id="area-legend"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">하위요인별 상세 진단</div>
      <table class="factor-table">
        <thead><tr>
          <th>요인</th><th>분포</th><th class="r">점수</th><th>진단</th>
        </tr></thead>
        <tbody id="factor-tbody"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">강점 & 개발 포인트</div>
      <div class="highlight-grid" id="highlight-grid"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
function switchTab(name) {} // 탭 제거됨

const raw = JSON.parse(localStorage.getItem('leadershipResult') || 'null');

if (!raw) {
  document.getElementById('tab-my').innerHTML = `
    <div style="text-align:center;padding:60px 20px;background:#fff;border-radius:12px;border:1px solid var(--border)">
      <p style="font-size:15px;color:var(--muted);margin-bottom:20px">결과 데이터가 없습니다.<br>설문을 먼저 완료해 주세요.</p>
      <a href="survey.html" style="display:inline-block;padding:12px 32px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-weight:700">설문 시작하기</a>
    </div>`;
} else {
  const { name, dept, pos, years, scores } = raw;
  const { factorScores, areaScores, total, strengths, develops } = calcScores(scores);

  document.getElementById('r-name').textContent = name || '익명';
  document.getElementById('r-meta').textContent = [dept, pos, years ? `근속 ${years}년` : null].filter(Boolean).join(' · ');
  document.getElementById('r-total').textContent = total.toFixed(2);

  // 방사형 그래프 — 그라데이션 + 평균선
  const canvas = document.getElementById('radarChart');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const grad = ctx.createRadialGradient(cx, cy, 8, cx, cy, 150);
  grad.addColorStop(0,   'rgba(68,114,196,0.50)');
  grad.addColorStop(0.45,'rgba(155,89,182,0.28)');
  grad.addColorStop(1,   'rgba(112,173,71,0.08)');

  // 일반 학습자 평균 (전체 3.2점 기준 — 추후 실제 데이터로 교체 가능)
  const BENCHMARK = [3.2, 3.1, 3.0, 3.2]; // Self / People / Change / Perf

  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: areaScores.map(a => a.label),
      datasets: [
        {
          label: '내 점수',
          data: areaScores.map(a => a.score),
          backgroundColor: grad,
          borderColor: 'rgba(68,114,196,0.8)',
          borderWidth: 1.5,
          pointBackgroundColor: areaScores.map(a => a.color),
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: 4,
          pointHoverRadius: 6,
        },
        {
          label: '학습자 평균',
          data: BENCHMARK,
          backgroundColor: 'rgba(220,50,50,0.06)',
          borderColor: 'rgba(220,50,50,0.75)',
          borderWidth: 1.2,
          borderDash: [4, 3],
          pointBackgroundColor: 'rgba(220,50,50,0.8)',
          pointBorderColor: '#fff',
          pointBorderWidth: 1.5,
          pointRadius: 3,
          pointHoverRadius: 5,
        }
      ]
    },
    options: {
      responsive: true,
      scales: { r: {
        min: 0, max: 5,
        ticks: { stepSize: 1, font: { size: 10, family: 'Pretendard' }, color: '#bbb', backdropColor: 'transparent' },
        grid: { color: 'rgba(0,0,0,0.07)' },
        pointLabels: { font: { size: 12, family: 'Pretendard', weight: '700' }, color: '#1A1916' },
        angleLines: { color: 'rgba(0,0,0,0.08)' },
      }},
      plugins: {
        legend: {
          display: true,
          position: 'bottom',
          labels: { font: { size: 11, family: 'Pretendard' }, boxWidth: 12, padding: 12,
            generateLabels: (chart) => [
              { text: '내 점수', fillStyle: 'rgba(68,114,196,0.6)', strokeStyle: 'rgba(68,114,196,0.8)', lineWidth: 1.5 },
              { text: '학습자 평균', fillStyle: 'rgba(220,50,50,0.1)', strokeStyle: 'rgba(220,50,50,0.75)', lineWidth: 1.2, lineDash: [4,3] }
            ]
          }
        }
      },
      animation: { duration: 700, easing: 'easeInOutQuart' }
    }
  });

  // 범례
  document.getElementById('area-legend').innerHTML = areaScores.map(a => `
    <div class="legend-item">
      <div class="legend-left">
        <div class="legend-dot-label">
          <div class="legend-dot" style="background:${a.color}"></div>
          <span class="legend-label">${a.label}</span>
        </div>
        <div class="legend-desc">${a.desc}</div>
        <div class="legend-bar-wrap">
          <div class="legend-bar-fill" style="width:${a.score/5*100}%;background:${a.color}"></div>
        </div>
      </div>
      <div class="legend-score" style="color:${a.color}">${a.score.toFixed(2)}</div>
    </div>`).join('');

  // 하위요인 테이블
  document.getElementById('factor-tbody').innerHTML = factorScores.map(f => {
    const area = AREAS.find(a => a.id === f.area);
    const interp = INTERPRETATIONS[f.id][getLevel(f.score)];
    return `<tr class="factor-row">
      <td><span class="area-badge" style="background:${area.color}">${area.label.split('-')[0]}</span><span class="factor-name">${f.label}</span></td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${f.score/5*100}%;background:${area.color}"></div></div></td>
      <td class="score-cell" style="color:${area.color}">${f.score.toFixed(2)}</td>
      <td class="desc-cell">${interp}</td>
    </tr>`;
  }).join('');

  // 강점/개발 (개발포인트에 실행 액션 추가)
  document.getElementById('highlight-grid').innerHTML = `
    <div class="hl-card s">
      <div class="hl-tag s">⭐ 강점 TOP 3</div>
      ${strengths.map(f => `
        <div class="hl-row"><span class="hl-name">${f.label}</span><span class="hl-score s">${f.score.toFixed(2)}</span></div>
        <div class="hl-interp">${INTERPRETATIONS[f.id].high}</div>`).join('')}
    </div>
    <div class="hl-card d">
      <div class="hl-tag d">🎯 개발 포인트 BOTTOM 3</div>
      ${develops.map(f => `
        <div class="hl-row"><span class="hl-name">${f.label}</span><span class="hl-score d">${f.score.toFixed(2)}</span></div>
        <div class="hl-interp">${INTERPRETATIONS[f.id].low}</div>
        <div style="margin-top:6px;margin-bottom:10px;display:flex;flex-direction:column;gap:4px">
          ${INTERPRETATIONS[f.id].action.map(a => `
            <div style="display:flex;align-items:flex-start;gap:6px;font-size:11px;color:#7A3A1E">
              <span style="flex-shrink:0;margin-top:1px">→</span><span>${a}</span>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
}
</script>
</body>
</html>
